indexing:
  collection_name: higgs-rag
  chunk_size: 1500
  chunk_overlap: 200
  scientific_chunk_size: 2000
  scientific_chunk_overlap: 300
  doc_type_rules:
    paper:
      - papers
      - publication
      - references/
    analysis_note:
      - analysis_notes
      - notes
      - docs/
    documentation:
      - README
      - readme
      - manual
sources:
  - name: project_references
    paths:
      - ../references
    extensions:
      - .pdf
      - .md
      - .txt
      - .tex
  - name: project_docs
    paths:
      - ../docs
    extensions:
      - .md
  - name: project_readme
    paths:
      - ../README.md
    extensions:
      - .md
