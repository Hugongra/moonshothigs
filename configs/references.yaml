indexing:
  collection_name: higgs-rag
  # Chunking tuned to match the historical NeurIPS draft artifact chunk count (295 chunks)
  # for this repository's indexed document set (7 PDF/MD sources under references/ + docs/ + README).
  chunk_size: 900
  chunk_overlap: 250
  scientific_chunk_size: 1000
  scientific_chunk_overlap: 200
  doc_type_rules:
    paper:
      - papers
      - publication
      - references/
    analysis_note:
      - analysis_notes
      - notes
      - docs/
    documentation:
      - README
      - readme
      - manual
sources:
  - name: project_references
    paths:
      - ../references
    extensions:
      - .pdf
      - .md
      - .txt
      - .tex
  - name: project_docs
    paths:
      - ../docs
    extensions:
      - .md
  - name: project_readme
    paths:
      - ../README.md
    extensions:
      - .md
